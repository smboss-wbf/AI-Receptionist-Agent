version: '3.8'

services:

  # LiveKit server — real-time audio infrastructure
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    ports:
      - "7880:7880"       # HTTP/WebSocket API
      - "7881:7881"       # RTC over TCP
      - "7882:7882/udp"   # RTC over UDP (WebRTC audio)
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    command: --bind 0.0.0.0 --dev
    restart: unless-stopped

  # Agent worker — voice pipeline (calls Google Calendar directly, no MCP)
  agent:
    build: .
    container_name: agent
    volumes:
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
    environment:
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
    command: python agent.py start
    restart: unless-stopped
    depends_on:
      - livekit

  # FastAPI server — creates agent rooms (called by n8n)
  server:
    build: .
    container_name: server
    ports:
      - "8001:8001"
    volumes:
      - ./token.json:/app/token.json
      - ./credentials.json:/app/credentials.json
    environment:
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    command: uvicorn server:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    depends_on:
      - livekit
